<div id="reader" style="width: 100%; min-height: 300px; background: #000;"></div>
<button id="start-btn" style="width: 100%; padding: 20px; background: #28a745; color: white; font-weight: bold; border: none; cursor: pointer;">
    📸 ACTIVAR CÁMARA
</button>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
    // Usamos el objeto global de la librería
    const scanner = new Html5Qrcode("reader");
    const btn = document.getElementById('start-btn');

    btn.addEventListener('click', () => {
        // Configuración simplificada pero efectiva para barras
        const config = { 
            fps: 15, 
            qrbox: { width: 300, height: 150 }
        };

        // Intentamos iniciar
        scanner.start(
            { facingMode: "environment" }, 
            config, 
            (decodedText) => {
                // ÉXITO AL LEER
                if(navigator.vibrate) navigator.vibrate(100);
                console.log("Leído:", decodedText);

                fetch('/api/escanear', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ codigo: decodedText })
                });

                // Pausa breve para evitar duplicados
                scanner.pause();
                setTimeout(() => scanner.resume(), 2000);
            },
            (errorMessage) => {
                // Este callback es para errores de escaneo (no de cámara)
                // Lo dejamos vacío para que no sature la consola
            }
        ).then(() => {
            btn.innerText = "Cámara Activa 🚀";
            btn.style.background = "#6c757d";
        }).catch(err => {
            console.error("Error de cámara:", err);
            alert("No se pudo abrir. RECUERDA: Debes entrar con HTTPS y dar permisos.");
        });
    });
</script>
